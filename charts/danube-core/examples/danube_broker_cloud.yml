# Danube Broker Configuration for Cloud Storage (S3/MinIO)
cluster_name: "MY_CLUSTER"

broker:
  host: "0.0.0.0"
  ports:
    client: 6650
    admin: 50051
    prometheus: 9040
    raft: 7650

# Metadata Store Configuration (embedded Raft consensus)
# data_dir is overridden by --data-dir CLI flag in Helm deployments.
# seed_nodes is overridden by --seed-nodes CLI flag in Helm deployments.
meta_store:
  data_dir: "/danube-data/raft"

bootstrap_namespaces:
  - "default"

auto_create_topics: true

auth:
  mode: none

load_manager:
  assignment_strategy: "balanced"
  load_report_interval_seconds: 30
  rebalancing:
    enabled: false
    aggressiveness: "balanced"
    check_interval_seconds: 300
    max_moves_per_hour: 10
    cooldown_seconds: 60
    min_brokers_for_rebalance: 2
    min_topic_age_seconds: 300
    blacklist_topics: []

# Storage Configuration (object_store mode with S3/MinIO)
storage:
  mode: object_store
  local_wal_root: "/danube-data/wal"
  metadata_prefix: "/danube"
  durable:
    backend: s3
    root: "s3://danube-messages/cluster-data"
    region: "us-east-1"
    endpoint: "http://minio:9000"
    access_key: "${AWS_ACCESS_KEY_ID}"
    secret_key: "${AWS_SECRET_ACCESS_KEY}"
    anonymous: false
    virtual_host_style: false
  local_retention:
    time_minutes: 2880
    size_mb: 20480
    check_interval_minutes: 5
  wal:
    rotation:
      max_bytes: 536870912

policies:
  max_producers_per_topic: 0
  max_subscriptions_per_topic: 0
  max_consumers_per_topic: 0
  max_consumers_per_subscription: 0
  max_publish_rate: 0
  max_subscription_dispatch_rate: 0
  max_message_size: 52428800
